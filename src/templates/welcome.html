<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to PathPoint AI</title>
    <style>
      .btn:hover {
        background-color: #003580 !important;
      }
      @media only screen and (max-width: 600px) {
        .container { width: 100% !important; }
        .padding { padding: 20px !important; }
        .stack {
          display: block !important;
          width: 100% !important;
        }
        .btn {
          display: block !important;
          width: 100% !important;
          box-sizing: border-box;
        }
        h1 {
          font-size: 22px !important;
          line-height: 28px !important;
        }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background: #f4f7f9; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding: 20px 10px">
          <table class="container" width="600" cellpadding="0" cellspacing="0" style="width: 100%; max-width: 600px; background: #ffffff; border-radius: 12px; border: 1px solid #e0e6ed;">
            <tr>
              <td align="center" style="padding: 25px 20px 10px; border-bottom: 1px solid #f1f5f9;">
                <div style="font-size: 32px; font-weight: bold; color: #0047ab; padding: 20px;">🚀 PathPoint AI</div>
              </td>
            </tr>
            <tr>
              <td align="center" class="padding" style="padding: 20px 25px 10px">
                <h1 style="margin: 0; font-size: 26px; line-height: 32px; color: #1e293b;">
                  Welcome {{username}} to PathPoint AI!
                </h1>
              </td>
            </tr>
            <tr>
              <td align="center" class="padding" style="padding: 0 25px 20px">
                <p style="margin: 0; font-size: 15px; line-height: 22px; color: #475569;">
                  Welcome to <strong>PathPoint AI</strong>. We are here to help you grow your career using smart tools.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 10px 20px 25px">
                <table width="100%" cellpadding="8" cellspacing="0">
                  <tr>
                    <td class="stack" width="50%" style="padding: 8px">
                      <table width="100%" style="background: #f1f5f9; border-radius: 10px">
                        <tr>
                          <td style="padding: 15px">
                            <strong style="color: #0047ab; font-size: 14px">ATS Analysis</strong>
                            <p style="margin: 5px 0 0; font-size: 12px; line-height: 18px; color: #475569;">
                              Optimize your CV.
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                    <td class="stack" width="50%" style="padding: 8px">
                      <table width="100%" style="background: #f1f5f9; border-radius: 10px">
                        <tr>
                          <td style="padding: 15px">
                            <strong style="color: #0047ab; font-size: 14px">Mentorship</strong>
                            <p style="margin: 5px 0 0; font-size: 12px; line-height: 18px; color: #475569;">
                              Connect with experts.
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td class="stack" width="50%" style="padding: 8px">
                      <table width="100%" style="background: #f1f5f9; border-radius: 10px">
                        <tr>
                          <td style="padding: 15px">
                            <strong style="color: #0047ab; font-size: 14px">Skills Bridge</strong>
                            <p style="margin: 5px 0 0; font-size: 12px; line-height: 18px; color: #475569;">
                              Learn smarter.
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                    <td class="stack" width="50%" style="padding: 8px">
                      <table width="100%" style="background: #f1f5f9; border-radius: 10px">
                        <tr>
                          <td style="padding: 15px">
                            <strong style="color: #0047ab; font-size: 14px">Auto Optimize</strong>
                            <p style="margin: 5px 0 0; font-size: 12px; line-height: 18px; color: #475569;">
                              Improve your CV.
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 15px; font-size: 11px; color: #94a3b8; border-top: 1px solid #e2e8f0;">
                <p style="margin: 0">PathPoint AI Support Team</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
