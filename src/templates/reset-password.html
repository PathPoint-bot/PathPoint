<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
    <style>
      .btn-cell:hover {
        background-color: #003580 !important;
      }
      .btn-link:hover {
        background-color: #003580 !important;
      }
      @media only screen and (max-width: 600px) {
        .container { width: 100% !important; }
        .padding { padding: 20px !important; }
        .btn-table { width: 100% !important; max-width: 100% !important; }
        h2 { font-size: 22px !important; }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background: #f4f7f9; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding: 20px 10px">
          <table class="container" width="600" cellpadding="0" cellspacing="0" style="width: 100%; max-width: 600px; background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0;">
            <tr>
              <td align="center" style="padding: 25px 20px 10px; border-bottom: 1px solid #f1f5f9;">
                <div style="font-size: 32px; font-weight: bold; color: #0047ab; padding: 20px;">🚀 PathPoint AI</div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 20px 20px 10px">
                <h2 style="margin: 0; font-size: 26px; line-height: 32px; color: #1e293b;">
                  Reset Your Password
                </h2>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 0 20px 20px">
                <p style="margin: 0; font-size: 15px; line-height: 22px; color: #64748b;">
                  Hi {{username}}, we received a request to reset your password. Use the code below to set a new one.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 10px 20px 25px">
                <table class="btn-table" width="100%" cellpadding="0" cellspacing="0" style="max-width: 300px">
                  <tr>
                    <td align="center" bgcolor="#0047AB" class="btn-cell" style="border-radius: 8px; transition: all 0.3s ease">
                      <div class="btn-link" style="display: block; padding: 14px 0; font-size: 20px; color: #ffffff; text-decoration: none; font-weight: bold; border-radius: 8px; letter-spacing: 4px;">
                        {{verificationCode}}
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 20px 25px">
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background: #e9eef4; padding: 15px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 13px; line-height: 20px; color: #475569;">
                      <strong>Note:</strong> If you didn't request this, you can ignore this email. The code expires in 15 minutes.
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 15px; font-size: 11px; color: #94a3b8; border-top: 1px solid #e2e8f0;">
                <p style="margin: 0">PathPoint AI Security Team</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
